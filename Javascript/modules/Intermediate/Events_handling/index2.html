<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: "Gilroy-light";
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }

      #abcd {
        transform: translate(-50%, -50%);
        position: absolute;
        transition: all cubic-bezier(0.19, 1, 0.22, 1) 0.8s;
        width: 400px;
        height: 400px;
        background-color: red;
      }
      #main {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #nav {
        width: 50%;
        height: 50%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #e4efe9;
        gap: 10px;
      }
      button {
        background-color: rgb(174, 174, 238);
        color: white;
        font-size: 14px;
        padding: 8px;
        font-weight: 500;
        font-family: "Gilroy";
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <!-- <div id="abcd"></div> -->
    <div id="main">
      <div id="nav">
        <a href="">home</a>
        <a href="">about</a>
        <button>Click and Follow</button>
      </div>
    </div>
    <script src="events2.js"></script>
  </body>
</html>
