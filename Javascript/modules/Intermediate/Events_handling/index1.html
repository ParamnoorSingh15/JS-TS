<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: "Gilroy-light";
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      #main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #222;
        flex-wrap: wrap;
        gap: 50px;
        
      }
      #fileInput {
        font-size: 30px;
        padding: 20px;
        display: none;
      }
      #btn {
        padding: 12px;
        background-color: rgb(41, 143, 114);
        color: white;
        border-radius: 5px;
      }
      #btn:hover {
        background-color: rgb(24, 82, 66);
      }

      form{
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .card{
        max-width: 300px;
        padding:20px;
        border:1px solid #555;
        display: inline-block;
        margin-top: 10px;
        border-radius: 10px;
        color: white;
      }
      .profile{
        width: 50px;
        height: 50px;
        border-radius: 50%;
        margin-bottom: 7px;
        overflow:hidden;
      }
      .profile img{
        height: 100%;
        width: 100%;
        object-fit: cover;
      }
      .card p{
        font-size: 12px;
        margin-top: 5px;
      }
      .card h5{
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <input type="file" id="fileInput" />
      <div id="btn">Upload File</div>

      <form action="">
        <input type="text" placeholder="profile pic" />
        <input type="text" placeholder="name" />
        <input type="text" placeholder="occupation" />
        <input type="text" placeholder="info" />
        <input type="submit" value="submit"/>
      </form>
      
    </div>
    
    <script src="events1.js"></script>
  </body>
</html>
