<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Download Progress</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
      }

      /* center layout */

      body {
        height: 100vh;

        display: flex;
        flex-direction: column;

        justify-content: center;
        align-items: center;

        gap: 20px;

        background: #f4f6f8;
      }

      /* progress container */

      .progress-container {
        width: 420px;
        height: 24px;

        background: #e5e7eb;

        border-radius: 20px;

        overflow: hidden;

        position: relative;
      }

      /* progress fill */

      .progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4f46e5, #3b82f6);
        transition: width 0.3s ease;
        z-index: 1;
      }

      /* percentage text */

      .progress-text {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 13px;
        font-weight: 600;
        color: white;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        z-index: 2;
      }

      /* button */

      button {
        padding: 10px 18px;

        border: none;

        border-radius: 6px;

        background: #4f46e5;

        color: white;

        font-weight: 500;

        cursor: pointer;
      }

      button:hover {
        background: #4338ca;
      }
    </style>
  </head>

  <body>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>

      <div class="progress-text" id="progressText">0%</div>
    </div>

    <button id="startBtn">Start Download</button>

    <script src="script1.js"></script>
  </body>
</html>
